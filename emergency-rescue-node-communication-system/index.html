<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Rescue System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #1a1a1a 0%, #7f1d1d 50%, #991b1b 100%);
      }
      /* For Webkit browsers (Chrome, Safari) */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0c0a09; /* dark background for the track */
      }
      ::-webkit-scrollbar-thumb {
        background-color: #4a5568; /* gray thumb */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #718096; /* lighter gray on hover */
      }
      
      .text-shadow-amber {
        text-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
      }
      
      .text-shadow-red {
        text-shadow: 0 0 15px rgba(220, 38, 38, 0.3);
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'fade-in': 'fade-in 0.5s ease-out forwards',
              'fade-in-up': 'fade-in-up 0.5s ease-out forwards',
              'fade-in-down': 'fade-in-down 0.5s ease-out forwards',
              'fade-in-left': 'fade-in-left 0.5s ease-out forwards',
              'fade-in-right': 'fade-in-right 0.5s ease-out forwards',
              'pulse-slow': 'pulse-slow 3s ease-in-out infinite',
              'bounce-subtle': 'bounce-subtle 0.6s ease-in-out',
              'shake': 'shake 0.5s ease-in-out',
              'fade-in-scale': 'fade-in-scale 0.3s ease-out forwards'
            },
            keyframes: {
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' }
              },
              'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              'fade-in-down': {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              'fade-in-left': {
                '0%': { opacity: '0', transform: 'translateX(-20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' }
              },
              'fade-in-right': {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' }
              },
              'pulse-slow': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.8' }
              },
              'bounce-subtle': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-3px)' }
              },
              'shake': {
                '0%, 100%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-5px)' },
                '75%': { transform: 'translateX(5px)' }
              },
              'fade-in-scale': {
                '0%': {
                  opacity: '0',
                  transform: 'scale(0.95)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'scale(1)'
                }
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.2.0",
    "react-dom/": "https://esm.sh/react-dom@19.2.0/",
    "react/": "https://esm.sh/react@19.2.0/",
    "@google/genai": "https://esm.sh/@google/generative-ai@1.29.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-stone-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
